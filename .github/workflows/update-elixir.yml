## SPDX-License-Identifier: MIT
name: "Update the Erlang and Elixir versions"

on:
  schedule:
    - cron: '0 4 4 * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare-elixir-version-patches:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare patch directory
        run: mkdir -p generated-patches

      - name: Search Elixir packages
        run: |
          nix search --json --inputs-from github:akirak/flake-pins \
            nixpkgs elixir \
            > elixir-packages.json

      - name: Generate Elixir version patches
        uses: openai/codex-action@10cb888d2ed3b99867f7e7ccff174a861a75aeb6 # v1.9
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          codex-args: --full-auto
          prompt-file: .github/skills/update-beam-versions/SKILL.md
          sandbox: workspace-write

      - name: Upload generated patches
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: elixir-version-patches
          path: generated-patches/
          if-no-files-found: ignore

  update:
    needs: prepare-elixir-version-patches
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        id: generate-token
        with:
          app-id: ${{ secrets.CREATE_PR_APP_ID }}
          private-key: ${{ secrets.CREATE_PR_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download generated patches
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: elixir-version-patches
          path: generated-patches
        continue-on-error: true

      - name: Apply generated patches
        shell: bash
        run: |
          set -euo pipefail

          if compgen -G 'generated-patches/*.patch' > /dev/null; then
            git apply generated-patches/*.patch
          fi

      - name: Get the app user ID
        id: get-user-id
        run: echo "user-id=$(gh api \"/users/${APP_SLUG}[bot]\" --jq .id)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          APP_SLUG: ${{ steps.generate-token.outputs.app-slug }}

      - name: Get the app user string
        id: get-user-string
        run: echo "string=${APP_SLUG}[bot] <${USER_ID}+${APP_SLUG}[bot]@users.noreply.github.com>" >> "$GITHUB_OUTPUT"
        env:
          APP_SLUG: ${{ steps.generate-token.outputs.app-slug }}
          USER_ID: ${{ steps.get-user-id.outputs.user-id }}

      - uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        id: cpr
        with:
          commit-message: 'chore: Update the Elixir version'
          committer: ${{ steps.get-user-string.outputs.string }}
          author: ${{ steps.get-user-string.outputs.string }}
          token: ${{ steps.generate-token.outputs.token }}
          base: master
          title: 'Update the Elixir version'
          branch: create-pull-request/update-elixir
          labels: automation,update

      - name: Auto-merge
        if: steps.cpr.outputs.pull-request-operation == 'created'
        run: |
          gh pr merge "$PR_NUMBER" \
            --delete-branch --squash --auto
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
