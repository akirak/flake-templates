name: "Update the Elixir version"

on:
  schedule:
    - cron: '0 4 4 * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare-elixir-version-patches:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare patch directory
        run: mkdir -p generated-patches

      - name: Search Elixir packages
        run: |
          nix search --json --inputs-from github:akirak/flake-pins \
            nixpkgs elixir \
            > elixir-packages.json

      - name: Generate Elixir version patches
        uses: openai/codex-action@v1.8
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          codex-args: --full-auto
          prompt-file: .github/skills/update-elixir-versions/SKILL.md
          sandbox: workspace-write

      - name: Upload generated patches
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: elixir-version-patches
          path: generated-patches/
          if-no-files-found: ignore

  update:
    needs: prepare-elixir-version-patches
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/create-github-app-token@v3
        id: generate-token
        with:
          app-id: ${{ secrets.CREATE_PR_APP_ID }}
          private-key: ${{ secrets.CREATE_PR_APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download generated patches
        uses: actions/download-artifact@v8
        with:
          name: elixir-version-patches
          path: generated-patches
        continue-on-error: true

      - name: Apply generated patches
        shell: bash
        run: |
          set -euo pipefail

          if compgen -G 'generated-patches/*.patch' > /dev/null; then
            git apply generated-patches/*.patch
          fi

      - name: Get the app user ID
        id: get-user-id
        run: echo "user-id=$(gh api "/users/${{ steps.generate-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}

      - name: Get the app user string
        id: get-user-string
        run: echo "string=${{ steps.generate-token.outputs.app-slug }}[bot] <${{ steps.get-user-id.outputs.user-id }}+${{ steps.generate-token.outputs.app-slug }}[bot]@users.noreply.github.com>"  >> "$GITHUB_OUTPUT"

      - uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        id: cpr
        with:
          commit-message: 'chore: Update the Elixir version'
          committer: ${{ steps.get-user-string.outputs.string }}
          author: ${{ steps.get-user-string.outputs.string }}
          token: ${{ steps.generate-token.outputs.token }}
          base: master
          title: 'Update the Elixir version'
          branch: create-pull-request/update-elixir
          labels: automation,update

      - name: Auto-merge
        if: steps.cpr.outputs.pull-request-operation == 'created'
        run: |
          gh pr merge ${{ steps.cpr.outputs.pull-request-number }} \
            --delete-branch --squash --auto
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
