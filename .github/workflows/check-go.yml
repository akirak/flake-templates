name: Check go
on:
  push:
    paths:
      # Set this to the directory of the template
      - go/**
      - .github/workflows/check-go.yml
  workflow_dispatch:
  workflow_call:
permissions:
  contents: read
concurrency:
  group: check-go-${{ github.ref }}
  cancel-in-progress: true
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          path: ./tmp

      - name: Set up Nix
        uses: ./tmp/.github/actions/setup-nix
        with:
          cachix-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Use the template
        run: |
          nix flake new -t ./tmp#go work

      - run: nix develop -c go version
        working-directory: work
