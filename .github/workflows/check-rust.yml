name: Check rust

on:
  push:
    paths:
      # Set this to the directory of the template
      - rust/**
      - .github/workflows/check-rust.yml
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: check-rust-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          path: ./tmp

      - name: Set up Nix
        uses: ./tmp/.github/actions/setup-nix
        with:
          cachix-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - run: cargo new --bin ./work

      - run: nix flake init -t ../tmp#rust
        working-directory: work

      - name: Initialize the project
        run: |
          cargo build
          git add .
        working-directory: work

      - name: Check executables
        run: |
          nix develop -L --command rustc --version
          nix develop -L --command cargo --version
          nix develop -L --command rust-analyzer --version
          # shellcheck disable=SC2016
          nix develop -L --command sh -c 'test -d ${RUST_SRC_PATH}'
        working-directory: work
