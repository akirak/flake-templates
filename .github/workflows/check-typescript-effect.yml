name: Check typescript-effect

on:
  push:
    paths:
      - typescript-effect/**
      - .github/workflows/check-typescript-effect.yml
  workflow_dispatch:
  workflow_call:

concurrency:
  group: check-typescript-effect-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          path: ./tmp
      - name: Set up Nix
        uses: ./tmp/.github/actions/setup-nix
        with:
          cachix-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: nix flake new -t ./tmp#typescript-effect ./work
      - name: Prepare the project
        working-directory: work
        run: |
          git init
          git add .

      - run: nix develop -L -c tsgo --version
        working-directory: work
