name: Check pre-commit

on:
  push:
    paths:
      # Set this to the directory of the template
      - pre-commit/**
      - .github/workflows/check-pre-commit.yml
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: check-pre-commit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          path: ./tmp
      - name: Set up Nix
        uses: ./tmp/.github/actions/setup-nix
        with:
          cachix-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - run: nix flake new -t ./tmp#pre-commit ./work
      - name: Prepare the project
        working-directory: work
        run: |
          git init
          git add .

      - name: Check the hook
        run: nix develop -L --command test .pre-commit-config.yaml
        working-directory: work
