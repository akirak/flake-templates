name: "Update flake.lock"

on:
  schedule:
    - cron: '0 4 * * 5'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        id: generate-token
        with:
          app-id: ${{ secrets.CREATE_PR_APP_ID }}
          private-key: ${{ secrets.CREATE_PR_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Nix
        uses: ./.github/actions/setup-nix
        with:
          cachix-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update flake.lock files
        shell: bash
        run: |
          set -euo pipefail

          while IFS= read -r lockfile; do
            dir=$(dirname "$lockfile")
            echo "Updating $lockfile"
            (
              cd "$dir"
              nix flake update
            )
          done < <(find . -name flake.lock -type f | sort)

      - name: Get the app user ID
        id: get-user-id
        run: echo "user-id=$(gh api \"/users/${APP_SLUG}[bot]\" --jq .id)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          APP_SLUG: ${{ steps.generate-token.outputs.app-slug }}

      - name: Get the app user string
        id: get-user-string
        run: echo "string=${APP_SLUG}[bot] <${USER_ID}+${APP_SLUG}[bot]@users.noreply.github.com>" >> "$GITHUB_OUTPUT"
        env:
          APP_SLUG: ${{ steps.generate-token.outputs.app-slug }}
          USER_ID: ${{ steps.get-user-id.outputs.user-id }}

      - uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        id: cpr
        with:
          commit-message: 'chore(nix): Update flake.lock'
          committer: ${{ steps.get-user-string.outputs.string }}
          author: ${{ steps.get-user-string.outputs.string }}
          # Use a fine-grained personal access token that can trigger other
          # workflows
          token: ${{ steps.generate-token.outputs.token }}
          base: master
          title: 'Update flake.lock'
          branch: create-pull-request/update-flake-lock
          labels: automation,update

      - name: Auto-merge
        if: steps.cpr.outputs.pull-request-operation == 'created'
        run: |
          gh pr merge "$PR_NUMBER" \
            --delete-branch --squash --auto
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
